<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="robots" content="noindex, nofollow">
  <title>Fluid</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui-overlay">
    <div class="ui-panel" id="ui-panel">
      <button id="btn-reset" class="ui-btn" title="Reset simulation" aria-label="Reset">↺</button>
      <button id="btn-particles" class="ui-btn active" title="Toggle particles" aria-label="Particles">✦</button>
      <button id="btn-spawn" class="ui-btn ui-btn-drag" title="Drop particles — drag onto canvas" aria-label="Drop particles" draggable="false">💧</button>
      <button id="btn-bloom" class="ui-btn active" title="Toggle bloom" aria-label="Bloom">✺</button>
      <button id="btn-colorful" class="ui-btn active" title="Toggle colorful" aria-label="Color">◐</button>
      <button id="btn-audio" class="ui-btn" title="Audio reactivity (microphone)" aria-label="Audio reactivity">🎤</button>

      <div class="ui-slider-group">
        <label for="slider-force">Force</label>
        <input type="range" id="slider-force" min="100" max="10000" value="3000" step="50" aria-label="Force">
      </div>

      <div class="ui-slider-group">
        <label for="slider-particles">Particles</label>
        <input type="range" id="slider-particles" min="500" max="10000" value="5000" step="500" aria-label="Particle count">
      </div>

      <div class="ui-slider-group">
        <label for="slider-dissipation">Dissipation</label>
        <input type="range" id="slider-dissipation" min="0" max="100" value="82" step="1" aria-label="Dissipation">
      </div>

      <div class="ui-slider-group">
        <label for="slider-viscosity">Viscosity</label>
        <input type="range" id="slider-viscosity" min="0" max="100" value="0" step="1" aria-label="Viscosity">
      </div>

      <button id="btn-hq-advect" class="ui-btn active" title="High-quality (MacCormack) advection" aria-label="High-quality advection">≈</button>

      <button id="btn-perf" class="ui-btn" title="Performance mode" aria-label="Performance mode">⚡</button>
    </div>

    <div id="fps-counter" aria-live="polite" aria-label="FPS counter">-- FPS</div>
  </div>

  <div id="webgl-error" class="hidden">
    <p>WebGL2 is required but not supported by your browser. Please use a modern browser.</p>
  </div>

  <script type="module" src="src/main.js"></script>

  <!--
    PWA service-worker registration.
    Guarded so that file:// or non-secure contexts simply skip it.
    The registration is fire-and-forget and never blocks app startup.
  -->
  <script>
    if ('serviceWorker' in navigator
        && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { scope: './' })
          .catch((err) => console.warn('[Fluid] SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
