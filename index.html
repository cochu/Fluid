<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="robots" content="noindex, nofollow">
  <title>Fluid</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui-overlay">
    <div class="ui-panel" id="ui-panel">
      <button id="btn-reset" class="ui-btn" data-tip="Reset" aria-label="Reset">↺</button>
      <button id="btn-particles" class="ui-btn active" data-tip="Particles on/off" aria-label="Particles">✦</button>
      <button id="btn-spawn" class="ui-btn ui-btn-drag onboard" data-tip="Drag onto canvas to spawn droplets" aria-label="Drop particles" draggable="false">💧</button>
      <button id="btn-bloom" class="ui-btn active" data-tip="Bloom glow" aria-label="Bloom">✺</button>
      <button id="btn-colorful" class="ui-btn active" data-tip="Palette: Random hue" aria-label="Hue palette">◐</button>
      <button id="btn-audio" class="ui-btn" data-tip="Microphone reactivity" aria-label="Audio reactivity">🎤</button>
      <div id="audio-panel" class="ui-subpanel" hidden role="group" aria-label="Audio reactivity controls">
        <div class="ui-subpanel-row">
          <label for="audio-device">Mic</label>
          <select id="audio-device" data-tip="Input microphone" aria-label="Microphone device">
            <option value="">Default microphone</option>
          </select>
        </div>
        <div class="ui-subpanel-row">
          <label for="slider-audio-bass">Bass</label>
          <input type="range" id="slider-audio-bass" min="0" max="100" value="55" step="1" data-tip="Bass band sensitivity" aria-label="Bass sensitivity">
        </div>
        <div class="ui-subpanel-row">
          <label for="slider-audio-mids">Mids</label>
          <input type="range" id="slider-audio-mids" min="0" max="100" value="52" step="1" data-tip="Mid-frequency sensitivity" aria-label="Mids sensitivity">
        </div>
        <div class="ui-subpanel-row">
          <label for="slider-audio-highs">Highs</label>
          <input type="range" id="slider-audio-highs" min="0" max="100" value="57" step="1" data-tip="High-frequency sensitivity" aria-label="Highs sensitivity">
        </div>
      </div>
      <button id="btn-midi" class="ui-btn" data-tip="MIDI input (note → splat, modwheel → force)" aria-label="MIDI input">🎹</button>
      <button id="btn-tilt" class="ui-btn" data-tip="Tilt-stir (tilt phone to move fluid)" aria-label="Tilt-stir (tilt phone to move fluid)">🧭</button>
      <button id="btn-obstacles" class="ui-btn" data-tip="Paint obstacles (drag on canvas)" aria-label="Paint obstacles">🧱</button>
      <button id="btn-erase" class="ui-btn" data-tip="Erase obstacles" aria-label="Erase obstacles">🩹</button>
      <button id="btn-undo" class="ui-btn" data-tip="Undo last obstacle stroke" aria-label="Undo obstacle stroke" disabled>↶</button>
      <button id="btn-clear-obstacles" class="ui-btn" data-tip="Clear obstacles" aria-label="Clear obstacles">🧽</button>
      <button id="btn-source" class="ui-btn" data-tip="Place permanent source (drag = direction, tap to remove)" aria-label="Place source">💠</button>
      <button id="btn-sink"   class="ui-btn" data-tip="Place sink — drains dye where you tap (tap marker to remove)" aria-label="Place sink">🕳️</button>
      <button id="btn-pause" class="ui-btn" data-tip="Pause (space)" aria-label="Pause">⏸</button>
      <button id="btn-snapshot" class="ui-btn" data-tip="Save snapshot (PNG)" aria-label="Save snapshot">📷</button>
      <button id="btn-share" class="ui-btn" data-tip="Copy share link with current settings" aria-label="Copy share link">🔗</button>
      <button id="btn-preset" class="ui-btn" data-tip="Preset: Default (tap to cycle)" aria-label="Scene preset">✨</button>
      <button id="btn-wallpaper" class="ui-btn" data-tip="Screensaver mode (UI fades, gentle auto-splats)" aria-label="Wallpaper mode">🌙</button>

      <div class="ui-slider-group">
        <label for="slider-force">Force</label>
        <input type="range" id="slider-force" min="0" max="100" value="50" step="1" data-tip="Splat force" aria-label="Force">
      </div>

      <div class="ui-slider-group">
        <label for="slider-dissipation">Persistence</label>
        <input type="range" id="slider-dissipation" min="0" max="100" value="65" step="1" data-tip="How long dye/velocity persist" aria-label="Persistence">
      </div>

      <div class="ui-slider-group" id="slider-group-brush" hidden>
        <label for="slider-brush">Brush</label>
        <input type="range" id="slider-brush" min="0" max="100" value="35" step="1" data-tip="Obstacle brush size" aria-label="Brush size">
      </div>

      <div class="ui-slider-group">
        <label for="slider-viscosity">Viscosity</label>
        <input type="range" id="slider-viscosity" min="0" max="100" value="0" step="1" data-tip="Honey-like thickness" aria-label="Viscosity">
      </div>

      <button id="btn-hq-advect" class="ui-btn active" data-tip="Dye advection: MacCormack (high quality)" aria-label="Dye advection scheme">⋍</button>
      <button id="btn-noslip" class="ui-btn" data-tip="Wall boundary: free-slip (fluid slides along edges)" aria-label="Wall boundary condition">⇌</button>
      <button id="btn-shading" class="ui-btn" data-tip="Faux-3D dye shading (off)" aria-label="Faux-3D dye shading">✦</button>

      <button id="btn-perf" class="ui-btn" data-tip="Performance mode" aria-label="Performance mode">⚡</button>
    </div>

    <div id="fps-counter" aria-live="polite" aria-label="FPS counter">-- FPS</div>
    <div id="version-tag" aria-hidden="true"></div>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
  </div>

  <div id="webgl-error" class="hidden">
    <p>WebGL2 is required but not supported by your browser. Please use a modern browser.</p>
  </div>
  <div id="snapshot-flash" aria-hidden="true"></div>
  <svg id="sources-overlay" aria-hidden="true"></svg>

  <div id="tilt-tutorial" hidden role="dialog" aria-modal="true" aria-labelledby="tilt-tutorial-title">
    <div class="tilt-tutorial-card">
      <h2 id="tilt-tutorial-title">Tilt to stir</h2>
      <p>Tilt your device to push the fluid around.</p>
      <p class="tilt-tutorial-note">iOS will ask for motion permission when you tap Allow.</p>
      <div class="tilt-tutorial-actions">
        <button type="button" id="tilt-tutorial-deny"  class="tilt-tutorial-btn tilt-tutorial-btn-secondary">Not now</button>
        <button type="button" id="tilt-tutorial-allow" class="tilt-tutorial-btn tilt-tutorial-btn-primary">Allow</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>

  <!--
    PWA service-worker registration.
    Guarded so that file:// or non-secure contexts simply skip it.
    The registration is fire-and-forget and never blocks app startup.
  -->
  <script>
    if ('serviceWorker' in navigator
        && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { scope: './' })
          .catch((err) => console.warn('[Fluid] SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
